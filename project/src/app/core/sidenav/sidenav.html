<!-- Mobile toggle -->
<button
  data-drawer-target="admin-sidebar"
  data-drawer-toggle="admin-sidebar"
  aria-controls="admin-sidebar"
  type="button"
  class="inline-flex items-center rounded-xl p-2 text-sm text-slate-600 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-200 dark:text-slate-300 dark:hover:bg-slate-900 dark:focus:ring-sky-900 sm:hidden"
>
  <span class="sr-only">Open sidebar</span>
  <svg class="h-6 w-6" aria-hidden="true" fill="currentColor" viewBox="0 0 20 20">
    <path
      fill-rule="evenodd"
      clip-rule="evenodd"
      d="M2 4.75A.75.75 0 012.75 4h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 4.75zm0 10.5a.75.75 0 01.75-.75h7.5a.75.75 0 010 1.5h-7.5a.75.75 0 01-.75-.75zM2 10a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 10z"
    ></path>
  </svg>
</button>

<!-- Sidebar / Drawer -->
<aside
  id="admin-sidebar"
  class="fixed left-0 top-0 z-40 h-screen w-72 -translate-x-full border-r border-slate-200 bg-white transition-transform dark:border-slate-800 dark:bg-slate-950 sm:translate-x-0"
  aria-label="Sidebar"
>
  <div class="flex h-full flex-col">
    <!-- Brand -->
    <div class="border-b border-slate-200 px-5 py-4 dark:border-slate-800">
      <a href="/admin" class="flex items-center gap-3">
        <span class="grid h-10 w-10 place-items-center rounded-xl bg-sky-600 text-white shadow-sm">
          <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" aria-hidden="true">
            <path d="M12 2.5c-4.7 0-8.5 3.8-8.5 8.5 0 6.3 8.5 10.5 8.5 10.5S20.5 17.3 20.5 11c0-4.7-3.8-8.5-8.5-8.5Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 7.5v7M8.5 11h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </span>
        <div class="leading-tight">
          <div class="text-sm font-semibold tracking-wide text-slate-900 dark:text-white">MedAdmin</div>
          <div class="text-xs text-slate-500 dark:text-slate-400">Clinical Console</div>
        </div>
      </a>
    </div>

    <!-- Nav -->
    <div class="flex-1 overflow-y-auto px-3 py-4">
      <ul class="space-y-1" aria-label="Main">
        <li>
          <a

            class="group flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold text-slate-900 hover:bg-slate-100 dark:text-white dark:hover:bg-slate-900"
          >
            <svg class="h-5 w-5 text-slate-400 group-hover:text-slate-900 dark:text-slate-500 dark:group-hover:text-white" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path d="M10 2a8 8 0 00-8 8v6a2 2 0 002 2h4v-7H6V9h2V7a3 3 0 013-3h2v2h-2a1 1 0 00-1 1v2h3l-1 2h-2v7h4a2 2 0 002-2v-6a8 8 0 00-8-8z"/>
            </svg>
            Dashboard
          </a>
        </li>

        <li>
          <button
            type="button"
            class="group flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-900 dark:hover:text-white"
            aria-controls="menu-patients"
            data-collapse-toggle="menu-patients"
          >
            <svg class="h-5 w-5 text-slate-400 group-hover:text-slate-900 dark:text-slate-500 dark:group-hover:text-white" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path d="M10 2a4 4 0 100 8 4 4 0 000-8z"/>
              <path d="M2 18a8 8 0 1116 0H2z"/>
            </svg>
            <span class="flex-1 text-left">User</span>
            <svg class="h-5 w-5 text-slate-400 dark:text-slate-500" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/>
            </svg>
          </button>

          <ul id="menu-patients" class="hidden space-y-1 py-1 pl-2">
            <li>
              <a routerLink ="/user/list" class="block rounded-xl px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-900 dark:hover:text-white">
User Liste              </a>
            </li>
          
         
         
          </ul>
        </li>

      </ul>
    </div>

    <!-- Footer -->
    <div class="border-t border-slate-200 px-3 py-3 dark:border-slate-800">
      <div class="flex items-center justify-between rounded-xl bg-slate-50 px-3 py-2 dark:bg-slate-900">
        <div class="min-w-0">
          <div class="truncate text-sm font-semibold text-slate-900 dark:text-white">Clinic Admin</div>
          <div class="truncate text-xs text-slate-500 dark:text-slate-400">admin@clinic.com</div>
        </div>
        <a
          href="/logout"
          class="rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-white hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-950 dark:hover:text-white"
        >
          Sign out
        </a>
      </div>
    </div>
  </div>
</aside>
