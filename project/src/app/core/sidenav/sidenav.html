<!-- sidenav.component.html -->
<aside
  class="flex h-screen w-[165px] flex-shrink-0 flex-col
         bg-[#1e2a4a] overflow-y-auto overflow-x-hidden">

  <!-- ── Avatar + Name + Socials ── -->
  <div class="flex flex-col items-center gap-2 pt-6 pb-4 px-3 border-b border-white/10">

    <!-- Avatar with purple ring -->
    <div class="relative">
      <img
        [src]="user.avatar"
        [alt]="user.name"
        class="h-16 w-16 rounded-full object-cover
               ring-[3px] ring-purple-500 ring-offset-[3px] ring-offset-[#1e2a4a]"
      />
      <!-- Online dot -->
      <span class="absolute bottom-1 right-0.5
                   h-[13px] w-[13px] rounded-full
                   bg-emerald-400 ring-2 ring-[#1e2a4a]">
      </span>
    </div>

    <!-- Name -->
    <p class="text-[13px] font-bold text-white text-center leading-snug">
      {{ user.name }}
    </p>

    <!-- Social buttons -->
    <div class="flex items-center gap-2 mt-0.5">




    </div>
  </div>

  <!-- ── Nav Items ── -->
  <nav class="flex flex-col py-3 gap-[2px]" aria-label="Main navigation">

    @for (item of navItems; track item.route) {

      <div class="relative px-2">

        <!-- Active background pill — full width rounded -->
        @if (active() === item.route) {
          <div class="absolute inset-0 mx-2 rounded-lg
                      bg-gradient-to-r from-[#2e6be6] to-[#1a4fc4]
                      shadow-[0_2px_12px_rgba(46,107,230,0.45)]">
          </div>
        }

        <button
          type="button"
          [routerLink]="item.route"
          (click)="setActive(item.route)"
          class="relative z-10 flex items-center gap-3 w-full rounded-lg
                 px-3 py-[9px] text-left transition-all duration-150"
          [class]="active() === item.route
            ? 'text-white'
            : 'text-[#7a8db8] hover:text-slate-200 hover:bg-white/[0.05]'"
        >

          <!-- Icon -->
          <span class="flex-shrink-0 flex h-[18px] w-[18px] items-center justify-center">

            @if (item.icon === 'logistics') {
       <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
  <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
</svg>
            }
            @if (item.icon === 'orders') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/>
                <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/>
              </svg>
            }
            @if (item.icon === 'fleet') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path fill-rule="evenodd" d="M2 5a2 2 0 012-2h8a2 2 0 012 2v10a2 2 0 002 2H4a2 2 0 01-2-2V5zm3 1h6v4H5V6zm6 6H5v2h6v-2z" clip-rule="evenodd"/>
                <path d="M15 7h1a2 2 0 012 2v5.5a1.5 1.5 0 01-3 0V7z"/>
              </svg>
            }
            @if (item.icon === 'warehouse') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h8a2 2 0 012 2v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4zm3 1h2v2H7V5zm0 4h2v2H7V9zm0 4h2v2H7v-2zm4-8h2v2h-2V5zm0 4h2v2h-2V9zm0 4h2v2h-2v-2z" clip-rule="evenodd"/>
              </svg>
            }
            @if (item.icon === 'income') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"/>
                <path fill-rule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clip-rule="evenodd"/>
              </svg>
            }
            @if (item.icon === 'reports') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path fill-rule="evenodd" d="M6 2a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V7.414A2 2 0 0015.414 6L12 2.586A2 2 0 0010.586 2H6zm2 10a1 1 0 10-2 0v3a1 1 0 102 0v-3zm2-3a1 1 0 011 1v5a1 1 0 11-2 0v-5a1 1 0 011-1zm4-1a1 1 0 10-2 0v7a1 1 0 102 0V8z" clip-rule="evenodd"/>
              </svg>
            }
            @if (item.icon === 'widgets') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM14 11a1 1 0 011 1v1h1a1 1 0 110 2h-1v1a1 1 0 11-2 0v-1h-1a1 1 0 110-2h1v-1a1 1 0 011-1z"/>
              </svg>
            }
            @if (item.icon === 'components') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/>
              </svg>
            }
            @if (item.icon === 'forms') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/>
              </svg>
            }
            @if (item.icon === 'editor') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
              </svg>
            }
            @if (item.icon === 'invoices') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path fill-rule="evenodd" d="M5 2a2 2 0 00-2 2v14l3.5-2 3.5 2 3.5-2 3.5 2V4a2 2 0 00-2-2H5zm2.5 3a1.5 1.5 0 100 3 1.5 1.5 0 000-3zm6.207.293a1 1 0 00-1.414 0l-6 6a1 1 0 101.414 1.414l6-6a1 1 0 000-1.414zM12.5 10a1.5 1.5 0 100 3 1.5 1.5 0 000-3z" clip-rule="evenodd"/>
              </svg>
            }
            @if (item.icon === 'calendars') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/>
              </svg>
            }
            @if (item.icon === 'tables') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path fill-rule="evenodd" d="M5 4a3 3 0 00-3 3v6a3 3 0 003 3h10a3 3 0 003-3V7a3 3 0 00-3-3H5zm-1 9v-1h5v2H5a1 1 0 01-1-1zm7 1h4a1 1 0 001-1v-1h-5v2zm0-4h5V8h-5v2zM9 8H4v2h5V8z" clip-rule="evenodd"/>
              </svg>
            }
            @if (item.icon === 'subscribers') {
              <svg fill="currentColor" viewBox="0 0 20 20" class="h-[17px] w-[17px]">
                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
              </svg>
            }

          </span>

          <!-- Label -->
          <span class="text-[12.5px] font-medium leading-snug flex-1">
            {{ item.label }}
          </span>

          <!-- Chevron for children -->
          @if (item.hasChildren) {
            <svg class="flex-shrink-0 h-3 w-3 opacity-50"
                 viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                    d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
                    clip-rule="evenodd"/>
            </svg>
          }

        </button>
      </div>

    }

  </nav>

</aside>
