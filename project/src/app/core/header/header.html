<!-- header.component.html -->
<header class="sticky top-0 z-50 flex items-center justify-between
               bg-[#1a2444] border-b border-white/10
               px-4 h-14 gap-3">

  <!-- ── Left : Back arrow + Logo ── -->
  <div class="flex items-center gap-3 flex-shrink-0">

    <!-- Back button -->
    <button type="button" aria-label="Go back"
            class="flex h-8 w-8 items-center justify-center rounded-lg
                   bg-white/10 text-white hover:bg-white/20 transition-colors">
      <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
              d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z"
              clip-rule="evenodd"/>
      </svg>
    </button>

    <!-- Logo -->
    <a href="/dashboard" class="flex items-center gap-2">
      <span class="flex h-8 w-8 items-center justify-center rounded-full
                   bg-gradient-to-br from-orange-400 to-red-500 text-white text-base shadow-md">
        💊
      </span>
      <span class="text-white font-bold text-[15px] tracking-wide hidden sm:block">
        MedicaApp
      </span>
    </a>

  </div>

  <!-- ── Center : Search bar ── -->
  <div class="flex-1 max-w-xs sm:max-w-sm">
    <div class="relative">
      <input
        type="search"
        placeholder="Search"
        class="w-full rounded-lg bg-white/10 border border-white/15
               py-1.5 pl-3 pr-9 text-sm text-white placeholder:text-slate-400
               focus:outline-none focus:ring-2 focus:ring-white/30
               focus:bg-white/15 transition-all duration-200"
      />
      <button type="button" aria-label="Search"
              class="absolute inset-y-0 right-0 flex items-center pr-2.5 text-slate-400 hover:text-white">
        <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
                d="M9 3a6 6 0 104.472 10.03l2.249 2.25a1 1 0 001.414-1.415l-2.25-2.249A6 6 0 009 3zm-4 6a4 4 0 118 0 4 4 0 01-8 0z"
                clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Right : Grid toggle + Notifications + Profile ── -->
  <div class="flex items-center gap-2 flex-shrink-0">

    <!-- Grid / View toggle -->

    </button> -->

    <!-- Profile -->
    <button type="button" aria-label="Open user menu"
            class="flex items-center gap-2 rounded-lg
                   bg-white/10 hover:bg-white/20 transition-colors
                   pl-1.5 pr-2.5 py-1">
      <img
        src="https://ui-avatars.com/api/?name=admin&background=6366f1&color=fff&size=64"
        alt="Admin avatar"
